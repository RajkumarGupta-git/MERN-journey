<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration</title>
    </head>
    <body>
        <form action="/action">
            <h2>Registration Form</h2>
            <br>
            <div>
                <label for="name">Enter Your Name :</label>
                <input type="text" id="name"  placeholder="First Name" name="fname">
                <input type="text" id="name" placeholder="Last Name" name="lname">

            </div>
            <br>
            <div>
                <label for="gender">Please Select Your Gender</label>
                <select name="gender" id="gender">
                    <option >Select Your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <br>
            <div>
                <!-- <p>Do you agree to all the terms and conditions ? </p> -->
                <label for="">Do you agree to all the terms and conditions ? </label>
                <input type="checkbox" name="check" id="check" required>
                <label for="checkbox">Yes,I agree</label>
            </div>
            <br>
            <button type="submit">Register</button>
        </form>
    </body>
</html>
